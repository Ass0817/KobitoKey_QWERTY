CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_MOUSE=y


CONFIG_SPI=y
CONFIG_INPUT=y


CONFIG_PMW3610=y
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_REPORT_INTERVAL_MIN=1

# スリープまでの時間を延ばす
CONFIG_ZMK_IDLE_TIMEOUT=0

# RUN→RESTへの遷移を遅らせて、放置後の復帰遅延を実質なくす
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=86400000
CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=86400000

# REST中もサンプル周期を短くして反応の鈍化を抑える
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=10
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=10
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=10

CONFIG_ZMK_BATTERY_REPORTING=y
