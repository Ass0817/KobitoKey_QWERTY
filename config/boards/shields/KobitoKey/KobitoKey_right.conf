CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_MOUSE=y


CONFIG_SPI=y
CONFIG_INPUT=y


CONFIG_PMW3610=y
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_REPORT_INTERVAL_MIN=12


CONFIG_ZMK_BATTERY_REPORTING=y

# スリープまでの時間を延ばす
CONFIG_ZMK_IDLE_TIMEOUT=0

# RUN→REST1（これはKconfigで上限 3264 が明記されているので最大でOK）
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264

# REST1→REST2、REST2→REST3 は「60秒」にする（安全圏）
CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=60000
CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=60000

# SAMPLE はデフォルト寄りに（10ms固定はやめる）
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=40
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=100
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=200
